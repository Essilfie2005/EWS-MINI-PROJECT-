version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ews-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ews_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dropout_ews}
      MYSQL_USER: ${MYSQL_USER:-ews_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ews_secure_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ews-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-ews_user}:${MYSQL_PASSWORD:-ews_secure_pass_2026}@mysql:3306/${MYSQL_DATABASE:-dropout_ews}
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME:-sandbox}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY:-}
      AFRICASTALKING_SENDER_ID: ${AFRICASTALKING_SENDER_ID:-}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      RISK_THRESHOLD: ${RISK_THRESHOLD:-0.5}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/ml/saved_models:/app/ml/saved_models
      - ./backend/plots:/app/plots

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ews-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
